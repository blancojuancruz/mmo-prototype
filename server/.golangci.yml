run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gocritic
    - bodyclose
    - noctx
    - godot

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style

  gofmt:
    simplify: true

  misspell:
    locale: US

issues:
  exclude-rules:
    # Ignorar errores no manejados en main.go
    - path: cmd/server/main.go
      linters:
        - errcheck

    # Ignorar en tests
    - path: _test\.go
      linters:
        - errcheck
        - gocritic