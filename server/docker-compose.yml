services:
  postgres:
    image: postgres:16
    container_name: mmorpg-postgres
    environment:
      POSTGRES_USER: mmorpg
      POSTGRES_PASSWORD: mmorpg123
      POSTGRES_DB: mmorpg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mmorpg-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: